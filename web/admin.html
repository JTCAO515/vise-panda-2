<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VisePanda Admin</title>
    <link rel="stylesheet" href="/web/app.css?v=6.1.1beta">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <img src="/static/img/logo-panda.jpg" alt="">
        <span>VisePanda Admin</span>
      </a>
      <button class="secondary" id="loadUsers" type="button">Load users</button>
    </header>
    <main class="section">
      <div class="section__head">
        <p class="eyebrow">Operations</p>
        <h1>Admin Console</h1>
      </div>
      <form class="planner" id="adminLogin">
        <label>Email<input name="email" type="email" required></label>
        <label>Password<input name="password" type="password" required></label>
        <button class="primary" type="submit">Sign in</button>
      </form>
      <p class="muted" id="adminStatus"></p>
      <div class="trip-list" id="userList"></div>
    </main>
    <script>
      const adminState = { token: sessionStorage.getItem("vp_admin_token") || "" };
      const status = document.querySelector("#adminStatus");
      const list = document.querySelector("#userList");
      async function adminApi(path, options = {}) {
        const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
        if (adminState.token) headers.Authorization = `Bearer ${adminState.token}`;
        const response = await fetch(path, { ...options, headers });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error?.message || "Request failed");
        return data;
      }
      function renderUsers(users) {
        list.replaceChildren(...users.map((user) => {
          const card = document.createElement("article");
          card.className = "trip-card";
          const title = document.createElement("h3");
          title.textContent = user.email;
          const meta = document.createElement("p");
          meta.className = "meta";
          meta.textContent = `${user.role} | ${user.name || "No name"}`;
          const button = document.createElement("button");
          button.className = "secondary";
          button.type = "button";
          button.textContent = "Delete";
          button.addEventListener("click", async () => {
            await adminApi(`/api/admin/users/${user.id}`, { method: "DELETE" });
            await loadUsers();
          });
          card.append(title, meta, button);
          return card;
        }));
      }
      async function loadUsers() {
        const data = await adminApi("/api/admin/users");
        renderUsers(data.users || []);
        status.textContent = "Users loaded.";
      }
      document.querySelector("#adminLogin").addEventListener("submit", async (event) => {
        event.preventDefault();
        const body = Object.fromEntries(new FormData(event.currentTarget).entries());
        const data = await adminApi("/api/auth/login", { method: "POST", body: JSON.stringify(body) });
        adminState.token = data.token;
        sessionStorage.setItem("vp_admin_token", data.token);
        status.textContent = "Signed in.";
        await loadUsers();
      });
      document.querySelector("#loadUsers").addEventListener("click", () => loadUsers().catch((error) => {
        status.textContent = error.message;
      }));
    </script>
  </body>
</html>
