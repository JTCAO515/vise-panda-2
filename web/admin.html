<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisePanda Admin</title>
<style>
  :root {
    --bg: #F5F0E8;
    --surface: #FFFFFF;
    --gold: #C9A96E;
    --gold-dark: #B89255;
    --text: #2D2D2D;
    --text-secondary: #6B6B5E;
    --text-tertiary: #9C9A94;
    --border: #E8E0D0;
    --red: #D9534F;
    --green: #5B7B5A;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Login Screen */
  .login-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .login-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 2px 12px rgba(201,169,110,0.12);
  }
  .login-card h1 {
    font-size: 24px;
    margin-bottom: 4px;
  }
  .login-card p {
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .login-card input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-card input:focus {
    border-color: var(--gold);
  }
  .login-card button {
    width: 100%;
    padding: 12px;
    background: var(--gold);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-card button:hover { background: var(--gold-dark); }
  .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error { color: var(--red); font-size: 13px; margin-bottom: 12px; display: none; }

  /* Dashboard */
  .dashboard { display: none; }
  .topbar {
    background: var(--surface);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .topbar h2 { font-size: 18px; }
  .topbar .admin-info { font-size: 13px; color: var(--text-secondary); }
  .topbar .logout {
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .topbar .logout:hover { background: var(--bg); }

  .content {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px;
  }
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    flex: 1;
    box-shadow: 0 1px 6px rgba(201,169,110,0.08);
  }
  .stat-card .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--gold-dark);
  }
  .stat-card .label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .user-table {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(201,169,110,0.08);
  }
  .user-table table {
    width: 100%;
    border-collapse: collapse;
  }
  .user-table th {
    text-align: left;
    padding: 14px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .user-table td {
    padding: 14px 16px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .user-table tr:last-child td { border-bottom: none; }
  .user-table tr:hover td { background: #FAF7F3; }
  .role-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }
  .role-admin { background: #F0E8D8; color: var(--gold-dark); }
  .role-user { background: #E8F0E8; color: var(--green); }
  .btn-delete {
    padding: 4px 12px;
    border: 1px solid var(--red);
    border-radius: 6px;
    background: transparent;
    color: var(--red);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-delete:hover { background: var(--red); color: #fff; }
  .btn-delete:disabled { opacity: 0.3; cursor: not-allowed; }

  .empty-state {
    text-align: center;
    padding: 48px;
    color: var(--text-tertiary);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    color: #fff;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }
</style>
</head>
<body>
  <!-- Login -->
  <div class="login-container" id="loginView">
    <div class="login-card">
      <h1>VisePanda Admin</h1>
      <p>Sign in with your admin account</p>
      <div class="login-error" id="loginError"></div>
      <input type="email" id="emailInput" placeholder="Email" autocomplete="email" autocapitalize="off">
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password">
      <button id="loginBtn" onclick="handleLogin()">Sign In</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboardView">
    <div class="topbar">
      <div>
        <h2>VisePanda Admin</h2>
        <div class="admin-info" id="adminInfo"></div>
      </div>
      <button class="logout" onclick="handleLogout()">Logout</button>
    </div>

    <div class="content">
      <div class="stats-row">
        <div class="stat-card">
          <div class="num" id="totalUsers">0</div>
          <div class="label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="num" id="adminUsers">0</div>
          <div class="label">Admins</div>
        </div>
        <div class="stat-card">
          <div class="num" id="regularUsers">0</div>
          <div class="label">Regular Users</div>
        </div>
      </div>

      <div class="user-table">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Role</th>
              <th>Registered</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="4" class="empty-state">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

<script>
const API_BASE = window.location.origin;
let authToken = localStorage.getItem('vp_admin_token') || '';
let currentUser = null;

// Auto-login if token exists
document.addEventListener('DOMContentLoaded', () => {
  if (authToken) {
    verifyAndLoad();
  }
});

async function verifyAndLoad() {
  try {
    const u = await api('/api/auth/me');
    if (u && u.user && u.user.role === 'admin') {
      currentUser = u.user;
      showDashboard();
      loadUsers();
      return;
    }
  } catch(e) {}
  // Token invalid
  authToken = '';
  localStorage.removeItem('vp_admin_token');
  showLogin();
}

async function handleLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');

  if (!email || !password) {
    errEl.textContent = 'Email and password required';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errEl.style.display = 'none';

  try {
    const res = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error || 'Login failed';
      errEl.style.display = 'block';
      return;
    }

    if (data.user.role !== 'admin') {
      errEl.textContent = 'Admin access required';
      errEl.style.display = 'block';
      return;
    }

    authToken = data.token;
    currentUser = data.user;
    localStorage.setItem('vp_admin_token', authToken);
    showDashboard();
    loadUsers();
  } catch(e) {
    errEl.textContent = 'Network error';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function handleLogout() {
  authToken = '';
  currentUser = null;
  localStorage.removeItem('vp_admin_token');
  showLogin();
}

function showLogin() {
  document.getElementById('loginView').style.display = 'flex';
  document.getElementById('dashboardView').style.display = 'none';
}

function showDashboard() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('dashboardView').style.display = 'block';
  document.getElementById('adminInfo').textContent = `Logged in as ${currentUser.email}`;
}

async function loadUsers() {
  const tbody = document.getElementById('userTableBody');
  tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Loading users...</td></tr>';

  try {
    const data = await api('/api/admin/users');
    const users = data.users || [];

    document.getElementById('totalUsers').textContent = users.length;
    document.getElementById('adminUsers').textContent = users.filter(u => u.role === 'admin').length;
    document.getElementById('regularUsers').textContent = users.filter(u => u.role === 'user').length;

    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No users found</td></tr>';
      return;
    }

    tbody.innerHTML = users.map(u => `
      <tr>
        <td>${escHtml(u.email)}</td>
        <td><span class="role-badge role-${u.role}">${u.role}</span></td>
        <td>${formatDate(u.created_at)}</td>
        <td>
          ${u.id !== currentUser.id
            ? `<button class="btn-delete" onclick="deleteUser('${u.id}')">Delete</button>`
            : '<span style="color:var(--text-tertiary);font-size:12px">You</span>'}
        </td>
      </tr>
    `).join('');
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state" style="color:var(--red)">Failed to load users</td></tr>';
  }
}

async function deleteUser(userId) {
  if (!confirm('Are you sure you want to delete this user?')) return;

  try {
    const data = await api(`/api/admin/users/${userId}`, 'DELETE');
    showToast('User deleted', 'success');
    loadUsers();
  } catch(e) {
    showToast(e.message || 'Failed to delete user', 'error');
  }
}

async function api(path, method = 'GET') {
  const res = await fetch(`${API_BASE}${path}`, {
    method,
    headers: {
      'Authorization': `Bearer ${authToken}`,
      'Content-Type': 'application/json',
    },
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function formatDate(iso) {
  if (!iso) return '-';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch { return iso; }
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
